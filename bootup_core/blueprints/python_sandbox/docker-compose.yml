version: '3.8'

services:
  notebook_workspace:
    image: jupyter/datascience-notebook:latest
    container_name: bootup_python_notebook
    ports:
      - "${APP_PORT}:8888"
    volumes:
      - ./notebooks/workspace:/home/jovyan/work
    environment:
      - JUPYTER_TOKEN=none
    entrypoint:
      - /bin/sh
      - -c
      - |
        mkdir -p /home/jovyan/.jupyter/lab/user-settings/@jupyterlab/apputils-extension
        echo '{"theme": "JupyterLab Dark"}' > /home/jovyan/.jupyter/lab/user-settings/@jupyterlab/apputils-extension/themes.json
        exec start-notebook.sh --NotebookApp.token=""
    networks:
      - bootup_network

  workspace_editor:
    image: codercom/code-server:latest
    container_name: bootup_python_editor
    ports:
      - "${IDE_PORT}:8443"
    volumes:
      - ./notebooks/workspace:/home/coder/project
    environment:
      - CS_DISABLE_TELEMETRY=true
      - AUTH=none
    # Bootstrap command to automatically inject user settings before launching the editor process
    entrypoint:
      - /bin/sh
      - -c
      - |
        mkdir -p /home/coder/.local/share/code-server/User
        echo '{"workbench.colorTheme": "Default Dark Modern", "editor.fontSize": 14}' > /home/coder/.local/share/code-server/User/settings.json
        exec /usr/bin/code-server --auth none --bind-addr 0.0.0.0:8443 /home/coder/project
    networks:
      - bootup_network

networks:
  bootup_network:
    driver: bridge
