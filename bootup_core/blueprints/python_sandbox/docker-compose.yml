version: '3.8'

services:
  notebook_workspace:
    image: jupyter/datascience-notebook:latest
    container_name: bootup_python_notebook
    ports:
      - "127.0.0.1:8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work
    environment:
      - JUPYTER_TOKEN=none # Disables token onboarding screen for simplified student usage
